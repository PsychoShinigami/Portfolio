<html>
    <body>
        <link rel="stylesheet" href="style.css?v=1.1">
        <div class="container">
            <h1 class="title">Guess the soul number</h1>
            <p class="description">A secret soul number lies between 1 and 100...</p>
            <div class="inner-container">
                <div class="lives-total">
                    <h1 class="lives-text">Lives</h1>
                    <div class="lives">
                        <img src="https://www.freeiconspng.com/thumbs/heart-png/heart-png-15.png" alt="heart" class="hearts" id="lives-img1">
                        <img src="https://www.freeiconspng.com/thumbs/heart-png/heart-png-15.png" alt="heart" class="hearts" id="lives-img2">
                        <img src="https://www.freeiconspng.com/thumbs/heart-png/heart-png-15.png" alt="heart" class="hearts" id="lives-img3">
                        <img src="https://www.freeiconspng.com/thumbs/heart-png/heart-png-15.png" alt="heart" class="hearts" id="lives-img4">
                        <img src="https://www.freeiconspng.com/thumbs/heart-png/heart-png-15.png" alt="heart" class="hearts" id="lives-img5">
                    </div>
                    <div class="lives-info">
                        <h1 class="lives-number" id="lives-num">5</h1>
                    </div>
                </div>
                <div class="guidance">
                    <img src="https://png.pngtree.com/png-vector/20240317/ourmid/pngtree-magic-crystal-ball-reflexion-future-object-png-image_11854473.png" alt="ball-image" class="ball-img">

                    <h1 class="guidance-text">Guidance</h1>
                    <div class="hint-container">
                        <h3 class="hint" id="hint"></h3>
                    </div>
                </div>
                <div class="input-container">
                    <h2 class="input">Enter your guess:</h2>
                    <div class="input-text">
                        <h3 class="sub-input">Numbers Only</h3>
                        <input id="guess-input" class="guess-input">
                    </div>
                </div>
                <div class="submit-container">
                    <button class="submit-btn" id="submit-btn">Guess Soul</button>
                </div>
            </div>
            <div class="reset-button">
               <button class="reset-btn" id="reset-btn">AC: forget your death</button>
            </div>  
        </div>
        <script src="script.js"></script>
    </body>
</html>
