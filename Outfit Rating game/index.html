<script>
let scores={
    score1:0,
    score2:0,
    score3:0
}
let voted={    
}
let votesDone=0;
let totalVotes = 0;
let currentPlayer=0;
let players=[];

function rate(resultId,type,scoreId){ 
    let currentPlayerName=players[currentPlayer];

    if (voted[currentPlayerName][scoreId]=== true){
        document.getElementById(resultId).innerText="Already voted bro😭";
        return;
    }

    if (type=='like'){
        document.getElementById(resultId).innerText="W choice";
        scores[scoreId]++;
    }else{
        document.getElementById(resultId).innerText="Bruh thats good.";
        scores[scoreId]--;
    }

    voted[currentPlayerName][scoreId]=true;
    document.getElementById(scoreId).innerText=scores[scoreId];

    votesDone++;
    totalVotes++;

    if (votesDone>=3){
        votesDone=0;
        currentPlayer++;

        if (currentPlayer>=players.length){
            currentPlayer=0;
        }

        if (totalVotes >= players.length * 3) {
            showResult();
            window.scrollTo({ top: 0, behavior: "smooth" }); // ✅ ADD THIS
            return;
        }

        document.getElementById("turn").innerText = players[currentPlayer] + "'s turn";
        window.scrollTo({ top: 0, behavior: "smooth" });
    }
}

function StartGame(){
    players = [];  // ✅ FIXED (removed let)

    // ✅ reset everything
    scores={ score1:0, score2:0, score3:0 };
    voted={};
    votesDone=0;
    totalVotes=0;
    currentPlayer=0;

    let count=document.getElementById("playerCount").value;

    if (!count || count <= 0) {
        alert("Enter valid number of players");
        return;
    }

    for (let i=0; i<count; i++) {
        let name=prompt("Enter the name of player "+(i+1)+":");
        players.push(name);
        voted[name]={score1:false,score2:false,score3:false};
    }

    document.getElementById("turn").innerText=players[currentPlayer]+"'s turn";
}

function showResult(){
    if (scores.score1 > scores.score2 && scores.score1 > scores.score3) {
        document.getElementById("turn").innerText="Outfit 1 wins with a score of "+scores.score1;
    }
    else if (scores.score2 > scores.score1 && scores.score2 > scores.score3) {
        document.getElementById("turn").innerText="Outfit 2 wins with a score of "+scores.score2;
    }
    else if (scores.score3 > scores.score1 && scores.score3 > scores.score2) {
        document.getElementById("turn").innerText="Outfit 3 wins with a score of "+scores.score3;
    }
    else {
        document.getElementById("turn").innerText="It's a tie!";
    }
}
